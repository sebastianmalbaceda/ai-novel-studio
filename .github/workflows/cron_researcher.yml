name: Agente Investigador (Cada 2 horas)

on:
  schedule:
    # Se ejecuta cada 2 horas para reducir llamadas a la API
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar investigador
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          cd src
          python researcher.py

      - name: Hacer commit y push del registro de investigación
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add data/research_log.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 AI Log: Nueva investigación añadida"
          git push
