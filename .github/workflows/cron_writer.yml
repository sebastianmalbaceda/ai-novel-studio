name: Agente Escritor (Cada Hora)

on:
  schedule:
    # Se ejecuta en el minuto 0 de cada hora
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  write-chapter:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar escritor
        env:
          # La API Key se lee desde el secret AI_API_KEY
          # Si tu config.json usa otro nombre en api_key_env, crea el secret correspondiente
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          cd src
          python writer.py

      - name: Hacer commit y push del nuevo capítulo y actualizar estado
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add chapters/ data/config.json data/research_log.txt data/resúmenes.md
          git diff --quiet && git diff --staged --quiet || git commit -m "📖 AI Release: Nuevo capítulo publicado"
          git push
