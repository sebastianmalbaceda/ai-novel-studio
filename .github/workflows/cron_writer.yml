name: Agente Escritor (Cada 4 Horas)

on:
  schedule:
    # Se ejecuta cada 4 horas para reducir saturación de contexto
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  write-chapter:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar escritor
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          cd src
          python writer.py

      - name: Hacer commit y push del nuevo capítulo y actualizar estado
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add chapters/ data/config.json data/research_log.txt data/resúmenes.md data/canon.md data/personajes.json data/cronología.json data/hilos_narrativos.json data/semillas.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📖 AI Release: Nuevo capítulo publicado"
          git pull --rebase --autostash origin main
          git push
